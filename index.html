<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://chatgpt.com/backend-api/estuary/content?id=file_00000000e4dc720e8642f4e1d45dbe22&ts=492592&p=fs&cid=1&sig=a04d9617df33e1184f9d72144245894c52356a6fc05c12ac7686b9d99ce8228a&v=0" class="avatar">
      <div>
        <span class="name">rafael Dev</span>
        <span class="username">@rafaelcode</span>
      </div>
    </div>

    <p class="post-text">
      CUIDADO 
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="https://i.pinimg.com/736x/9e/4e/97/9e4e97acaf29dddc7d8473549ba6a81b.jpg" class="avatar-small">
        <p>TOME MUITO CUIDADO</p>
      </div>

      <div class="comment">
        <img src="https://i.pinimg.com/736x/3e/1d/34/3e1d3464c6b436a5b9b8697c215ed47f.jpg" class="avatar-small">
        
        
        <p>TOMOU CUIDADO?</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
